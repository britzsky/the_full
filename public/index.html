    <!-- 커스텀 마우스 커서 스크립트 (비활성화)
    <script>
      (function() {
        var html = document.documentElement;
        var cursorStyle = document.getElementById('app-custom-cursor-style');

        function keepCursorStyleLast() {
          if (!cursorStyle || !document.head || document.head.lastElementChild === cursorStyle) return;
          document.head.appendChild(cursorStyle);
        }

        keepCursorStyleLast();
        window.addEventListener('load', keepCursorStyleLast);
        setTimeout(keepCursorStyleLast, 0);
        setTimeout(keepCursorStyleLast, 120);
        setTimeout(keepCursorStyleLast, 400);

        if (window.MutationObserver && document.head) {
          var obs = new MutationObserver(keepCursorStyleLast);
          obs.observe(document.head, { childList: true });
        }

        document.addEventListener('pointerdown', function() {
          html.setAttribute('data-cur', 'click');
        }, true);

        document.addEventListener('pointerup', function() {
          setTimeout(function() { html.removeAttribute('data-cur'); }, 120);
        }, true);

        document.addEventListener('pointercancel', function() {
          html.removeAttribute('data-cur');
        }, true);

        window.addEventListener('blur', function() {
          html.removeAttribute('data-cur');
        });
      })();
    </script>
